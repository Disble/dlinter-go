name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Test (unit + analysistest)
        run: go test ./...

  selflint:
    name: selflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Cache custom-gcl
        id: cache-custom-gcl
        uses: actions/cache@v4
        with:
          path: ./bin/custom-gcl
          key: custom-gcl-${{ hashFiles('.custom-gcl.yml', 'go.sum') }}

      - name: Build custom-gcl
        if: steps.cache-custom-gcl.outputs.cache-hit != 'true'
        run: |
          # Keep this version in sync with `version:` in .custom-gcl.yml.
          #
          # Do not pin below v2.12.2: golangci-lint <= v2.11 builds its
          # internal clone with "-c advice.detachedHead=false" as a SINGLE
          # argv element, so git parses the key with a leading space. git
          # >= 2.54 rejects that ("invalid key:  advice.detachedHead"),
          # which breaks `golangci-lint custom` on current runners. Fixed
          # upstream by splitting the flag into two arguments.
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" custom

      - name: Self-lint (dlinter against the real package graph)
        run: ./bin/custom-gcl run ./...

  deadcode:
    name: deadcode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run deadcode
        # Single source of truth for the deadcode check and its documented
        # plugin-entrypoint allowlist (see docs/spikes.md). The script
        # installs the deadcode binary first, so `go: downloading ...`
        # noise never pollutes the captured analysis output — an inline
        # `go run ...@latest` here previously failed CI on exactly that.
        run: bash scripts/hooks/deadcode-check.sh
