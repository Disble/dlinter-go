name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Test (unit + analysistest)
        run: go test ./...

  selflint:
    name: selflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Cache custom-gcl
        id: cache-custom-gcl
        uses: actions/cache@v4
        with:
          path: ./bin/custom-gcl
          key: custom-gcl-${{ hashFiles('.custom-gcl.yml', 'go.sum') }}

      - name: Build custom-gcl
        if: steps.cache-custom-gcl.outputs.cache-hit != 'true'
        run: |
          # `golangci-lint custom` clones github.com/golangci/golangci-lint
          # over anonymous HTTPS, which gets rate-limited from shared runner
          # IPs (git exits 128). Route github.com clones through the
          # workflow token so the clone is authenticated.
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.0
          "$(go env GOPATH)/bin/golangci-lint" custom
          git config --global --unset-all url."https://x-access-token:${{ github.token }}@github.com/".insteadOf

      - name: Self-lint (dlinter against the real package graph)
        run: ./bin/custom-gcl run ./...

  deadcode:
    name: deadcode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run deadcode
        # Single source of truth for the deadcode check and its documented
        # plugin-entrypoint allowlist (see docs/spikes.md). The script
        # installs the deadcode binary first, so `go: downloading ...`
        # noise never pollutes the captured analysis output — an inline
        # `go run ...@latest` here previously failed CI on exactly that.
        run: bash scripts/hooks/deadcode-check.sh
