name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Test (unit + analysistest)
        run: go test ./...

  selflint:
    name: selflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Cache custom-gcl
        id: cache-custom-gcl
        uses: actions/cache@v4
        with:
          path: ./bin/custom-gcl
          key: custom-gcl-${{ hashFiles('.custom-gcl.yml', 'go.sum') }}

      - name: Probe golangci-lint clone (diagnostic)
        if: steps.cache-custom-gcl.outputs.cache-hit != 'true'
        run: |
          # `golangci-lint custom` clones golangci-lint and swallows git's
          # stderr, reporting only "exit status 128". Reproduce the exact
          # clone here, anonymous and token-authenticated, with stderr
          # visible, so the failure mode is diagnosable from the log.
          git version
          if git clone --branch v2.1.0 --single-branch --depth 1 \
              https://github.com/golangci/golangci-lint.git /tmp/probe-anon; then
            echo "PROBE anonymous clone: OK"
          else
            echo "PROBE anonymous clone: FAILED (exit $?)"
          fi
          if git clone --branch v2.1.0 --single-branch --depth 1 \
              "https://x-access-token:${{ github.token }}@github.com/golangci/golangci-lint.git" /tmp/probe-token; then
            echo "PROBE token clone: OK"
          else
            echo "PROBE token clone: FAILED (exit $?)"
          fi
          rm -rf /tmp/probe-anon /tmp/probe-token

      - name: Build custom-gcl
        if: steps.cache-custom-gcl.outputs.cache-hit != 'true'
        run: |
          # Authenticate the internal clone via the workflow token; -v makes
          # golangci-lint surface the captured git output on failure.
          git config --global url."https://x-access-token:${{ github.token }}@github.com/golangci/".insteadOf "https://github.com/golangci/"
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.0
          "$(go env GOPATH)/bin/golangci-lint" custom -v
          git config --global --unset-all url."https://x-access-token:${{ github.token }}@github.com/golangci/".insteadOf

      - name: Self-lint (dlinter against the real package graph)
        run: ./bin/custom-gcl run ./...

  deadcode:
    name: deadcode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run deadcode
        # Single source of truth for the deadcode check and its documented
        # plugin-entrypoint allowlist (see docs/spikes.md). The script
        # installs the deadcode binary first, so `go: downloading ...`
        # noise never pollutes the captured analysis output — an inline
        # `go run ...@latest` here previously failed CI on exactly that.
        run: bash scripts/hooks/deadcode-check.sh
