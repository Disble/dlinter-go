# dlinter-go — recommended preset
#
# A curated golangci-lint configuration that turns on architecture governance
# (dlinter) alongside the best-practice linters every Go project benefits from:
# documentation discipline (revive), duplication (dupl), cognitive complexity
# (gocognit), and dead-symbol detection (unused).
#
# This is a TEMPLATE, not a remote import — golangci-lint has no mechanism to
# extend a module's config. Copy it to your repo as `.golangci.yml`, then edit
# the `roles` block to match your architecture. (`dlinter init` will scaffold
# this for you in a future release.) Requires the custom binary built from a
# `.custom-gcl.yml` that includes `github.com/Disble/dlinter-go`.
version: "2"

linters:
  enable:
    - dlinter # architecture: package-role / import-direction contracts
    - revive # documentation: exported symbols and packages carry doc comments
    - dupl # duplication: copy-pasted code fragments
    - gocognit # complexity: cognitive load per function
    - unused # dead code: unused symbols within the module
    - funlen
    - nolintlint
    - nestif
    # revive: exported guarantees a doc comment EXISTS on the public surface;
    # godoclint checks the ones that exist are well-formed (correct subject,
    # proper godoc structure). Missing docs and wrong docs are different
    # failures, and a misleading comment is worse than none.
    #
    # Neither requires comments on unexported symbols, deliberately: Go scopes
    # doc requirements to the exported contract, and mandating them on private
    # helpers reliably produces tautologies ("// run runs the thing") that
    # train readers to ignore comments entirely.
    - godoclint
  exclusions:
    rules:
      # Calibrated against a real 133-file codebase, not guessed: on that
      # repo funlen fired 26 times and 23 of those (88%) were tests, and
      # dupl split 11/11. Long test functions (setup, act, many explicit
      # assertions) and repeated fixture scaffolding are idiomatic Go, not
      # design smells — DRY-ing them usually hurts readability.
      #
      # gocognit and nestif deliberately still apply to tests: a test whose
      # control flow is hard to follow is a genuine smell, since a test you
      # cannot read cannot be trusted as a specification.
      - path: _test\.go
        linters:
          - funlen
          - dupl
  settings:
    dupl:
      threshold: 100
    funlen:
      # A function longer than this is doing more than one thing. The honest
      # fix is extraction; a dumb extraction still passes, which is why funlen
      # is a MEDIUM lever and gocognit below is the strong one.
      lines: 60
      statements: 40
      # Opposite of file-length-limit's choice, deliberately: comments INSIDE a
      # function are what a good decomposition adds, so do not penalize them.
      ignore-comments: true
    gocognit:
      # Tightened from 20. Cognitive complexity has NO escape by relocation --
      # moving code does not lower a function's score. The only way out is real
      # decomposition: extract method, strategy map instead of nested switch,
      # early return. This is the strongest general-purpose lever in the set.
      min-complexity: 15
    nestif:
      # Independent of gocognit, not redundant: a SHORT function with a 4-level
      # pyramid scores ~10 on gocognit and slips under it. Deep nesting is the
      # single most characteristic signature of generated spaghetti.
      min-complexity: 4
    nolintlint:
      # A linter cannot police the config that configures it. What it CAN do is
      # force every suppression to name its linter and explain itself in
      # English, turning silent deletion of a rule into a reviewable diff.
      require-explanation: true
      require-specific: true
      allow-unused: false
      allow-no-explanation: []
    revive:
      rules:
        - name: exported
        - name: package-comments
        - name: file-length-limit
          # Map-form arguments verified against revive v1.15.0, the
          # version pinned via golangci-lint v2.12.2.
          arguments:
            - max: 400
              # Comments are NOT counted, and that is a correction: the
              # original reasoning (don't let a generator pad with free
              # comments) assumed comments were optional. requireDoc makes a
              # doc comment mandatory on every unexported func, so counting
              # them punishes compliance -- two files in a real 133-file
              # codebase crossed 400 purely by adding the docs this preset
              # demands. File size measures CODE mass, which is what the
              # lever is for; funlen already uses ignore-comments for the
              # same reason. File size stays the WEAKEST lever -- its escape
              # is sharding into foo2.go -- and is never the headline.
              skipComments: true
              skipBlankLines: false
    custom:
      dlinter:
        type: module
        description: package-role / import-direction contracts
        settings:
          # Replace these example roles with your own. Each role lists the
          # packages that belong to it and the roles it may depend on. Path
          # matching: exact ("internal/domain"), subtree (trailing "/"), or
          # module root ("."). Unroled, stdlib, and external imports are
          # ignored — rules constrain only your own module's graph.
          roles:
            core:
              packages:
                - internal/domain
              mayDependOn: []
            adapter:
              packages:
                - internal/adapters/
              mayDependOn:
                - core
            entrypoint:
              packages:
                - "."
                - cmd/
              mayDependOn:
                - core
                - adapter
